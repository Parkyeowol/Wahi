<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>wahi · 당신의 커피 취향이 시작되는 곳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400&family=Urbanist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --wahi-white: #FFFFFF;
  --wahi-ink: #191818;
  --wahi-espresso: #3B2314;
  --wahi-crema: #F5ECD7;
  --text-primary: #191818;
  --text-muted: rgba(25,24,24,.52);
  --text-accent: #3B2314;
  --text-on-dark: #F5ECD7;
  --text-on-dark-muted: rgba(245,236,215,.55);
  --font-display: 'Raleway', 'Pretendard Variable', sans-serif;
  --font-body: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
  --font-body-en: 'Urbanist', sans-serif;
  --weight-light: 300;
  --dur-fast: 120ms;
  --dur-base: 200ms;
  --dur-slow: 380ms;
  --ease-standard: cubic-bezier(.4,0,.2,1);
  --press-opacity: .72;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  background: #0f0f0f;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

/* ── Phone shell ─────────────────────────── */
#app {
  position: relative;
  width: 390px;
  height: 844px;
  background: var(--wahi-white);
  overflow: hidden;
  /* On actual mobile, fill the screen */
}

@media (max-width: 430px) {
  html, body { background: var(--wahi-white); }
  #app { width: 100%; height: 100dvh; height: 100vh; }
}

/* ── Screen system ───────────────────────── */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--wahi-white);
  transition: transform 320ms var(--ease-standard), opacity 320ms var(--ease-standard);
}
.screen--ink { background: var(--wahi-ink); color: var(--text-on-dark); }
.screen--hidden { pointer-events: none; opacity: 0; transform: translateX(32px); }
.screen--back { pointer-events: none; opacity: 0; transform: translateX(-24px); }

/* ── Status bar ──────────────────────────── */
.status-bar {
  flex: none;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px 0 24px;
  font-family: var(--font-body-en);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: .02em;
}
.status-right { display:flex; align-items:center; gap:6px; }
.signal-bars { display:flex; align-items:flex-end; gap:2px; height:10px; }
.signal-bars i { width:3px; background:currentColor; border-radius:.5px; display:block; }
.signal-bars i:nth-child(1){height:4px} .signal-bars i:nth-child(2){height:6px}
.signal-bars i:nth-child(3){height:8px} .signal-bars i:nth-child(4){height:10px}
.battery { width:22px; height:11px; border:1.5px solid currentColor; border-radius:2.5px; position:relative; opacity:.85; }
.battery::after { content:""; position:absolute; right:-4px; top:2.5px; width:2px; height:6px; background:currentColor; border-radius:0 1px 1px 0; }
.battery-fill { position:absolute; inset:1.5px; width:72%; background:currentColor; border-radius:1px; }

/* ── Progress bar ────────────────────────── */
.progress-bar { flex:none; height:3px; background:rgba(25,24,24,.10); }
.progress-bar-fill { height:100%; background:var(--wahi-espresso); transition:width var(--dur-slow) var(--ease-standard); }

/* ── Screen body ─────────────────────────── */
.body { flex:1; display:flex; flex-direction:column; padding:0 20px 36px; min-height:0; overflow-y:auto; }

/* ── Nav ─────────────────────────────────── */
.top-nav { flex:none; height:50px; display:flex; align-items:center; margin:0 -4px; }
.btn-back { width:40px; height:40px; display:flex; align-items:center; justify-content:center; background:transparent; border:0; cursor:pointer; color:var(--text-primary); }
.screen--ink .btn-back { color:var(--text-on-dark); }
.btn-back svg { width:20px; height:20px; }

/* ── Eyebrow / step ──────────────────────── */
.step-label { font-family:var(--font-body-en); font-size:12px; letter-spacing:.28em; font-weight:500; color:var(--text-accent); text-transform:uppercase; }
.section-label { font-family:var(--font-body-en); font-size:11px; letter-spacing:.3em; font-weight:500; color:var(--text-muted); text-transform:uppercase; }
.screen--ink .section-label { color:var(--text-on-dark-muted); }

/* ── Headlines ───────────────────────────── */
.q-headline { font-family:var(--font-display); font-weight:var(--weight-light); font-size:29px; line-height:1.34; letter-spacing:-.01em; white-space:pre-line; }
.q-sub { font-size:14px; line-height:1.72; color:var(--text-muted); white-space:pre-line; }
.screen--ink .q-sub { color:var(--text-on-dark-muted); }
.q-hint { font-size:12.5px; line-height:1.55; color:var(--text-accent); }

/* ── Cards ───────────────────────────────── */
.cards { display:flex; flex-direction:column; gap:12px; }
.card {
  position:relative; display:flex; align-items:center; gap:14px;
  width:100%; text-align:left; min-height:64px; padding:14px 16px;
  background:var(--wahi-white); color:var(--text-primary);
  border:1px solid rgba(25,24,24,.18); border-radius:0; cursor:pointer;
  transition: background var(--dur-base) var(--ease-standard),
              color var(--dur-base) var(--ease-standard),
              border-color var(--dur-base) var(--ease-standard);
  font-family: var(--font-body);
}
.card-main { flex:1; min-width:0; display:flex; flex-direction:column; gap:3px; }
.card-title { font-size:15px; font-weight:500; line-height:1.35; letter-spacing:-.005em; }
.card-sub { font-size:12.5px; font-weight:400; line-height:1.4; color:var(--text-muted); }
.card-chev { flex:none; color:rgba(25,24,24,.32); display:flex; }
.card-chev svg { width:16px; height:16px; }
.card--sel { background:var(--wahi-ink); color:var(--text-on-dark); border-color:var(--wahi-ink); }
.card--sel .card-sub { color:var(--text-on-dark-muted); }
.card--sel .card-chev { color:rgba(255,255,255,.55); }
.card:active { opacity:.82; }

/* ── Buttons ─────────────────────────────── */
.actions { display:flex; flex-direction:column; gap:10px; }
.btn {
  width:100%; height:56px; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-body); font-size:15px; font-weight:500; letter-spacing:.01em;
  border-radius:0; border:1px solid transparent; cursor:pointer;
  transition: background var(--dur-base) var(--ease-standard), opacity var(--dur-fast) var(--ease-standard);
}
.btn-primary { background:var(--wahi-ink); color:var(--wahi-white); border-color:var(--wahi-ink); }
.btn-primary:active { opacity:var(--press-opacity); }
.btn-disabled { background:rgba(25,24,24,.10); color:rgba(25,24,24,.35); border-color:transparent; cursor:not-allowed; pointer-events:none; }
.btn-secondary { background:var(--wahi-white); color:var(--text-primary); border-color:rgba(25,24,24,.7); }
.btn-secondary:active { opacity:var(--press-opacity); }

/* ── Splash ──────────────────────────────── */
.splash-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
.splash-logo-text {
  font-family: 'Raleway', sans-serif;
  font-weight: 100;
  font-size: 72px;
  letter-spacing: 8px;
  color: var(--wahi-crema);
}
.splash-i-accent { position:relative; }
.splash-i-accent::after {
  content: "";
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 14px;
  background: var(--wahi-crema);
  border-radius: 1px;
  animation: smoke 2s ease-in-out infinite;
}
@keyframes smoke {
  0%,100% { opacity:.8; transform:translateX(-50%) scaleY(1); }
  50% { opacity:.3; transform:translateX(-60%) scaleY(1.3) rotate(4deg); }
}
.splash-tagline { margin-top:28px; font-family:var(--font-body); font-size:13px; line-height:1.8; letter-spacing:.02em; color:var(--text-on-dark-muted); text-align:center; }
.splash-loader { position:absolute; left:0; right:0; bottom:56px; display:flex; justify-content:center; }
.splash-loader-track { position:relative; width:64px; height:1.5px; background:rgba(245,236,215,.18); overflow:hidden; }
.splash-loader-track::after { content:""; position:absolute; top:0; left:0; width:40%; height:100%; background:var(--wahi-crema); animation:sweep 1.7s cubic-bezier(.4,0,.6,1) infinite; }
@keyframes sweep { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }

/* ── Start logo ──────────────────────────── */
.start-logo {
  font-family: 'Raleway', sans-serif;
  font-weight: 100;
  font-size: 28px;
  letter-spacing: 4px;
  color: var(--wahi-ink);
}

/* ── Result ──────────────────────────────── */
.r-logo-wrap { display:flex; justify-content:center; padding:6px 0 22px; }
.r-logo {
  font-family: 'Raleway', sans-serif;
  font-weight: 100;
  font-size: 22px;
  letter-spacing: 4px;
  color: var(--wahi-ink);
}
.coffee-card { background:var(--wahi-ink); color:var(--text-on-dark); padding:24px; }
.coffee-name { font-family:var(--font-display); font-weight:var(--weight-light); font-size:24px; line-height:1.22; }
.coffee-brew { margin-top:8px; font-family:var(--font-body); font-size:12.5px; letter-spacing:.04em; color:var(--text-on-dark-muted); }
.tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:18px; }
.tag { font-family:var(--font-body); font-size:11px; letter-spacing:.04em; line-height:1; padding:6px 10px; background:var(--wahi-espresso); color:var(--wahi-crema); }
.meters { display:flex; flex-direction:column; gap:11px; margin-top:22px; }
.meter { display:flex; align-items:center; gap:14px; }
.meter-label { font-family:var(--font-body); font-size:12px; letter-spacing:.06em; color:var(--text-on-dark-muted); width:52px; flex:none; }
.dots { display:flex; gap:6px; }
.dot { width:9px; height:9px; border-radius:50%; border:1px solid rgba(245,236,215,.35); }
.dot--on { background:var(--wahi-crema); border-color:var(--wahi-crema); }
.coffee-info { margin-top:20px; padding-top:18px; border-top:1px solid rgba(245,236,215,.16); display:flex; flex-direction:column; gap:9px; }
.coffee-info-row { display:flex; justify-content:space-between; gap:16px; font-family:var(--font-body); font-size:12.5px; }
.coffee-info-key { color:var(--text-on-dark-muted); letter-spacing:.04em; flex:none; }
.coffee-info-val { color:var(--text-on-dark); text-align:right; }
.why-box { background:var(--wahi-crema); color:var(--wahi-ink); padding:20px; margin-top:14px; }
.why-h { font-family:var(--font-body); font-size:13px; font-weight:600; }
.why-b { font-family:var(--font-body); font-size:13.5px; line-height:1.78; margin-top:10px; color:rgba(25,24,24,.74); }
.rec-wrap { margin-top:24px; }
.rec-label { font-family:var(--font-body-en); font-size:11px; letter-spacing:.22em; font-weight:500; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; }
.rec-sub { font-size:13.5px; color:var(--text-primary); margin:0 0 12px; }
.rec-item { display:flex; align-items:center; justify-content:space-between; gap:12px; border:1px solid rgba(25,24,24,.18); padding:15px 16px; margin-bottom:10px; }
.rec-name { font-size:14.5px; font-weight:500; line-height:1.35; }
.rec-desc { font-size:12px; color:var(--text-muted); margin-top:3px; line-height:1.4; }
.rec-chev { color:rgba(25,24,24,.3); flex:none; display:flex; }
.r-actions { display:flex; flex-direction:column; gap:10px; margin-top:28px; }

.spacer { flex:1; min-height:16px; }
.h8 { height:8px; }
.h12 { height:12px; }
.h14 { height:14px; }
.h18 { height:18px; }
.h20 { height:20px; }
.h24 { height:24px; }
.h28 { height:28px; }
</style>
</head>
<body>
<div id="app"></div>

<script>

// 실시간 시계
function updateClock() {
  const el = document.getElementById('wahi-clock');
  if (!el) return;
  const now = new Date();
  const h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, '0');
  el.textContent = h + ':' + m;
}
setInterval(updateClock, 1000);
updateClock();

// ── State ──────────────────────────────────────────────
const state = {
  screen: 'splash',
  level: null,     // 'beginner' | 'explorer' | 'expert'
  step: 0,
  answers: {},
  history: []
};

// ── Screen definitions ─────────────────────────────────
const FLOWS = {
  beginner: ['b1','b2','b3','result'],
  explorer: ['e1','e2','e3','e4','result'],
  expert:   ['x1','x2','x3','x4','result'],
};

// ── Router ─────────────────────────────────────────────
function goTo(screen, pushHistory = true) {
  if (pushHistory && state.screen !== screen) state.history.push(state.screen);
  state.screen = screen;
  render();
}

function goBack() {
  const prev = state.history.pop();
  if (prev) { state.screen = prev; render(); }
}

// ── Icons ──────────────────────────────────────────────
const ARROW_LEFT = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.5 4L6.5 10l6 6M6.5 10H17"/></svg>`;
const CHEVRON = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3.5L10.5 8 6 12.5"/></svg>`;

// ── Components ─────────────────────────────────────────
function statusBar(dark = false) {
  const c = dark ? 'style="color:var(--wahi-crema)"' : '';
  return `<div class="status-bar" ${c}>
    <span id="wahi-clock">9:41</span>
    <span class="status-right">
      <span class="signal-bars"><i></i><i></i><i></i><i></i></span>
      <span class="battery"><span class="battery-fill"></span></span>
    </span>
  </div>`;
}

function progressBar(value) {
  return `<div class="progress-bar"><div class="progress-fill" style="height:100%;width:${value*100}%;background:var(--wahi-espresso);transition:width 380ms cubic-bezier(.4,0,.2,1)"></div></div>`;
}

function topNav(dark = false) {
  return `<div class="top-nav"><button class="btn-back" onclick="goBack()" aria-label="뒤로">${ARROW_LEFT}</button></div>`;
}

function cards(items, selKey, dark = false) {
  return `<div class="cards">${items.map((c, i) => {
    const sel = state.answers[selKey] === i;
    return `<button class="card${sel ? ' card--sel' : ''}" onclick="selectCard('${selKey}',${i});render()">
      <span class="card-main">
        <span class="card-title">${c.t}</span>
        ${c.s ? `<span class="card-sub">${c.s}</span>` : ''}
      </span>
      ${c.chev ? `<span class="card-chev">${CHEVRON}</span>` : ''}
    </button>`;
  }).join('')}</div>`;
}

function primaryBtn(label, action, enabled) {
  return `<button class="btn btn-primary${enabled ? '' : ' btn-disabled'}" ${enabled ? `onclick="${action}"` : ''}>${label}</button>`;
}
function secondaryBtn(label, action) {
  return `<button class="btn btn-secondary" onclick="${action}">${label}</button>`;
}

function dotMeter(label, value, max = 5) {
  const dots = Array.from({length:max}, (_,i) => `<span class="dot${i < value ? ' dot--on' : ''}"></span>`).join('');
  return `<div class="meter"><span class="meter-label">${label}</span><span class="dots">${dots}</span></div>`;
}

function selectCard(key, idx) {
  state.answers[key] = idx;
}

// ── Screens ────────────────────────────────────────────

function renderSplash() {
  setTimeout(() => { if (state.screen === 'splash') goTo('start'); }, 2400);
  return `<div class="screen screen--ink" id="screen-splash">
    ${statusBar(true)}
    <div class="splash-wrap">
      <div class="splash-logo-text">wah<span class="splash-i-accent">i</span></div>
      <div class="splash-tagline">당신의 커피 취향이<br>시작되는 곳</div>
      <div class="splash-loader"><div class="splash-loader-track"></div></div>
    </div>
  </div>`;
}

function renderStart() {
  const sel = state.answers['level'];
  const levels = [
    { t:'처음이에요', s:'커피가 아직 낯설어요', chev:true },
    { t:'조금 알아요', s:'마셔봤지만 탐색 중이에요', chev:true },
    { t:'잘 알아요', s:'좋아하는 커피가 있어요', chev:true },
  ];
  const enabled = sel !== undefined;
  const actions = {0:'beginner', 1:'explorer', 2:'expert'};
  const nextAction = enabled ? `startFlow('${actions[sel]}')` : '';
  return `<div class="screen" id="screen-start">
    ${statusBar()}
    <div class="body">
      <div class="top-nav" style="justify-content:flex-start; padding-left:2px;">
        <span class="start-logo">wahi</span>
      </div>
      <div class="h24"></div>
      <h1 class="q-headline">커피,\n얼마나 알고\n계세요?</h1>
      <p class="q-sub" style="margin-top:14px">솔직하게 골라주세요.\n어떤 답이든 괜찮아요.</p>
      <div class="spacer" style="min-height:32px"></div>
      ${cards(levels, 'level')}
      <div class="h8"></div>
      <div class="spacer"></div>
      <div class="actions">
        ${primaryBtn('시작하기', `startFlow('${actions[sel] || ''}')`, enabled)}
      </div>
    </div>
  </div>`;
}

function startFlow(level) {
  state.level = level;
  state.step = 0;
  goTo(FLOWS[level][0]);
}

// Question screen factory
function questionScreen({ id, screenId, label, step, progress, q, sub, hint, items, cta, nextAction }) {
  const sel = state.answers[id];
  const enabled = sel !== undefined;
  return `<div class="screen" id="screen-${screenId}">
    ${statusBar()}
    ${progressBar(progress)}
    <div class="body">
      ${topNav()}
      <div class="step-label">${step}</div>
      <div class="h18"></div>
      <h1 class="q-headline">${q}</h1>
      ${sub ? `<p class="q-sub" style="margin-top:12px">${sub}</p>` : ''}
      ${hint ? `<p class="q-hint" style="margin-top:10px">${hint}</p>` : ''}
      <div class="spacer"></div>
      ${cards(items, id)}
      <div class="h20"></div>
      <div class="actions">
        ${primaryBtn(cta || '다음', nextAction, enabled)}
      </div>
    </div>
  </div>`;
}

// ── Beginner screens
function renderB1() {
  return questionScreen({ id:'b1', screenId:'b1', label:'Beginner', step:'1 / 3', progress:1/3,
    q:'오늘 어떤\n하루였어요?', sub:'기분에 맞는 커피를 찾아드릴게요',
    items:[{t:'맑고 가벼운 날이에요'},{t:'조용히 쉬고 싶은 날'},{t:'집중이 필요한 날'}],
    nextAction:"goTo('b2')" });
}
function renderB2() {
  return questionScreen({ id:'b2', screenId:'b2', label:'Beginner', step:'2 / 3', progress:2/3,
    q:'평소에 신 음식\n좋아하세요?', sub:'레모네이드, 과일, 요거트 같은 것들',
    hint:'* 커피에도 과일처럼 상큼한 맛이 있을 수 있어요',
    items:[{t:'네, 상큼한 게 좋아요'},{t:'보통이에요'},{t:'별로예요, 쓴맛이 좋아요'}],
    nextAction:"goTo('b3')" });
}
function renderB3() {
  return questionScreen({ id:'b3', screenId:'b3', label:'Beginner', step:'3 / 3', progress:1,
    q:'어떤 향이 더\n끌리나요?', cta:'결과 보기',
    items:[{t:'딸기잼 · 복숭아 · 꽃',s:'상큼하고 화사한 향'},{t:'초콜릿 · 캐러멜 · 견과',s:'달콤하고 고소한 향'},{t:'구운 빵 · 흙 · 나무',s:'묵직하고 따뜻한 향'}],
    nextAction:"goTo('r1')" });
}

// ── Explorer screens
function renderE1() {
  return questionScreen({ id:'e1', screenId:'e1', label:'Explorer', step:'1 / 4', progress:1/4,
    q:'산미가 있는 커피\n좋아하세요?', sub:'산미 = 커피의 상큼하고 신 맛',
    items:[{t:'네, 산미 있는 게 좋아요'},{t:'적당하면 괜찮아요'},{t:'산미는 별로예요'}],
    nextAction:"goTo('e2')" });
}
function renderE2() {
  return questionScreen({ id:'e2', screenId:'e2', label:'Explorer', step:'2 / 4', progress:2/4,
    q:'커피 농도는\n어떻게 좋아하세요?',

  state.step = 0;
  state.answers = {};
  state.history = [];
  goTo('start', false);
}

// ── Render ─────────────────────────────────────────────
const RENDERERS = {
  splash: renderSplash,
  start: renderStart,
  b1: renderB1, b2: renderB2, b3: renderB3,
  e1: renderE1, e2: renderE2, e3: renderE3, e4: renderE4,
  x1: renderX1, x2: renderX2, x3: renderX3, x4: renderX4,
  r1: renderR1, r2: renderR2, r3: renderR3,
};

function render() {
  const fn = RENDERERS[state.screen];
  if (!fn) return;
  document.getElementById('app').innerHTML = fn();
  updateClock();
}

// Initial render
